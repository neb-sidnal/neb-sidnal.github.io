<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="utf-8">
    <title>STNO Drum Pad</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css?family=Arvo" rel="stylesheet">
</head>

<body>

    <div id="title">
        Senza Tregua
        Noise Orchestra
        <div class="subtitle">mobile version sample app</div>
    </div>

    <div class="grid">
        <button class="pad drum" data-sound="kick808">Kick</button>
        <button class="pad drum" data-sound="clap808">Clap</button>
        <button class="pad drum" data-sound="snare">Snare</button>

        <button class="pad drum" data-sound="coil">Coil</button>
        <button class="pad drum" data-sound="synthpad">Synth</button>
        <button class="pad drum" data-sound="bikechain">Bike Chain</button>

        <button class="pad drum" data-sound="static">Static</button>
        <button class="pad drum" data-sound="bells">Bells</button>
        <button class="pad drum" data-sound="motor">Motor</button>

        <button class="pad drum" data-sound="dishes">Dishes</button>
        <button class="pad drum" data-sound="bubblewrap">Bubble Wrap</button>
        <button class="pad drum" data-sound="tetra">Tetra</button>

        <button class="pad drum" data-sound="bird">Bird</button>
        <button class="pad drum" data-sound="cello">Cello</button>
        <button class="pad drum" data-sound="washingmachine">Washing Machine</button>

        <button class="pad drum" data-sound="glass">Glass</button>
        <button class="pad drum" data-sound="timpani">Timpani</button>
        <button class="pad drum" data-sound="whitenoise">White Noise</button>

        <button class="pad drum" data-sound="feedback">Feedback</button>
        <button class="pad drum" data-sound="unlockeddoor">Unlocked Door</button>
        <button class="pad drum" data-sound="clock">Clock</button>
    
    <br>

    </div>
    </div>

    <div id="popupOverlay">
        <div id="popupBox">
            <p>Suonate con noi!<br>Aiutateci a fare più rumore </p>
            <p>Istruzioni</p>
            <ul>
                <li>Alzate il volume del telefono.</li>
                <li>Toccate i pad per riprodurre un suono. Toccate più pad per riprodurre più suoni contemporaneamente.</li>
                <li>Ricordate di divertirti</li>
            </ul>
            <button class="close" onclick="closePopup()">Start playing!</button>
        </div>
    </div>

    <script src="main.js"></script>
</body>

</html>
